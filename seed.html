async function post(table,rows){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:H,body:JSON.stringify(rows)});

async function del(table){

function ac(d,m=0){
  const t=d.toUpperCase();
  if(/COPEC|SHELL/.test(t))return m>=18500&&m<=21000?"Parafina":"Bencina";

  if(/YOUTUBE|PP\*GOOGLE/.test(t))return"Streaming YouTube";
  if(/SPOTIFY/.test(t))return"Streaming Spotify";
  if(/NETFLIX/.test(t))return"Streaming Otros";
  if(/GTD|MANQUEHUE/.test(t))return"GTD";

  if(/UBER TRIP|UBER LAS/.test(t))return"Carrete";
  if(/CHILENA CONSOLIDADA|SEGUROS CLC|RENTA NAC|HDI SEGUROS/.test(t))return"Seguro CLC";
  if(/ZURICH/.test(t))return"Seguro Casa";
  if(/FLOW \*SEGUROS SUR/.test(t))return"Seguro Auto";
  if(/ALTAVISTA|PARQUE CHAMISERO/.test(t))return"Gastos Comunes";
  if(/ARACELLYS|LAURA BUTRON|SOLANGE ARRIAG/.test(t))return"Nana";
  if(/PARKING|AUTOPISTA|SABA /.test(t))return"Autopistas";
  if(/VIDAURRE BIKES/.test(t))return"Bicicleta otros";
  if(/SCHARFSTEIN|CLEMENTINA CONTADORA/.test(t))return"Oficina";
  if(/DIEGO WEED/.test(t))return"Weed";

  if(/PAGO LINEA DE CRED|PAGO LINEA/.test(t))return"Abono Línea";
  if(/CARGO POR PAGO TC|PAGO TARJETA DE CREDITO|PAGO PESOS TEF/.test(t))return"Pago TC";
  if(/IMPUESTO LINEA|INTERESES LINEA|COMISION/.test(t))return"Costo Bancos";
  if(/CHILEAUTOS|1616GARAGE/.test(t))return"Mantencion Auto";
  if(/SERVIPAG|I MUNICIPALIDAD/.test(t))return"Contribuciones";
  if(/PROYTEC|60070 COLIN CHICU|ADMINISTRACION Y|RODRIGO AEDO|EDUARDO VULCA|CONRAD/.test(t))return"Casa servicios";
  if(/CV 1252|CV 1012|UPITA|PALUMBO|TUU\*|VENTI|BUENA SED|MARIBERICO|BOTILLERIA|LICORERIAS|OSO CON HUMITA|BEER GARDEN|NAPOLEON|LJUACIDA|LAURINA|LOVELYN/.test(t))return"Carrete";

  if(/RECAUDACION/.test(t))return"Otros";
  return"Sin clasificar";
}

async function cargar(){
  document.getElementById('btn').disabled=true;
  log('Iniciando carga...','info');

  // Cartola
  log(`Cargando ${CARTOLA.length} registros de cartola...`,'info');
  const ctaRows=CARTOLA.map(r=>({mes:r[0],fecha:r[1],descripcion:r[2],cargo:r[3],abono:r[4],categoria:ac(r[2],r[3]),nota:''}));
  const ok1=await post('cartola',ctaRows);
  log(ok1?`✓ Cartola: ${ctaRows.length} registros`:'✗ Error en cartola',ok1?'ok':'err');

  // TC Nac
  log(`Cargando ${TCNAC.length} registros de TC Nacional...`,'info');
  const tnRows=TCNAC.map(r=>({mes:r[0],fecha:r[1],descripcion:r[2],monto:r[3],categoria:ac(r[2],r[3]),nota:''}));
  const ok2=await post('tc_nac',tnRows);
  log(ok2?`✓ TC Nacional: ${tnRows.length} registros`:'✗ Error en TC Nacional',ok2?'ok':'err');

  // TC Int
  log(`Cargando ${TCINT.length} registros de TC Internacional...`,'info');
  const tiRows=TCINT.map(r=>({mes:r[0],fecha:r[1],descripcion:r[2],pais:r[3],usd:r[4],categoria:r[5],nota:''}));
  const ok3=await post('tc_int',tiRows);
  log(ok3?`✓ TC Internacional: ${tiRows.length} registros`:'✗ Error en TC Internacional',ok3?'ok':'err');

  const total=ctaRows.length+tnRows.length+tiRows.length;
  log(`\n✅ CARGA COMPLETA — ${total} registros en Supabase`,'ok');
  log('Ahora abre index.html y verás todos los datos cargados.','info');
  document.getElementById('btn').disabled=false;
}
